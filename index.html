<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reality Shift v3</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>

<body>

<section id="boot" class="scene active">
  <pre id="bootText"></pre>
</section>

<section id="entry" class="scene">
  <h1>YOU ENTERED THE SYSTEM</h1>
  <button onclick="goScene('choice')">continue</button>
</section>

<section id="choice" class="scene">
  <h2>WHERE DO YOU WANT TO GO?</h2>

  <button onclick="setPath('memory')">memory world</button>
  <button onclick="setPath('core')">system core</button>
</section>

<section id="memory" class="scene">
  <div id="memoryCards"></div>
</section>

<section id="core" class="scene">
  <div id="coreOrb"></div>
  <p>touch the core</p>
</section>

<section id="final" class="scene">
  <div id="finalText"></div>
</section>

</body>

<script src="script.js"></script>
</html>
